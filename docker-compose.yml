services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-encore}
      POSTGRES_USER: ${POSTGRES_USER:-encore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-encore}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-encore}"]
      interval: 2s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.2
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${POSTGRES_USER:-encore}:${POSTGRES_PASSWORD:-encore}@db:5432/${POSTGRES_DB:-encore}?sslmode=disable",
        "up",
      ]

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-encore}:${POSTGRES_PASSWORD:-encore}@db:5432/${POSTGRES_DB:-encore}?sslmode=disable

volumes:
  pgdata:
